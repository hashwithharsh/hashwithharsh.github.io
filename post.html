<!-- Marked.js for Markdown parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="js/content.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    window.location.href = 'blog.html';
    return;
  }

  // Find post metadata
  const blogs = await fetchBlogs();
  const meta = blogs.find(b => b.slug === slug);

  // Render header
  const header = document.getElementById('postHeader');
  if (meta) {
    document.title = meta.title + ' — hashwithharsh';
    // Dynamic Open Graph tags
    const setMeta = (prop, content, attr = 'property') => {
      let el = document.querySelector(`meta[${attr}="${prop}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
      el.setAttribute('content', content);
    };
    setMeta('og:title',       meta.title);
    setMeta('og:description', meta.excerpt);
    setMeta('og:type',        'article');
    setMeta('og:url',         window.location.href);
    setMeta('article:published_time', meta.date, 'name');
    setMeta('twitter:card',   'summary', 'name');
    setMeta('twitter:title',  meta.title, 'name');
    setMeta('twitter:description', meta.excerpt, 'name');

    header.innerHTML = `
      <div class="post-header-tags">
        ${meta.tags.map(t => `<span class="blog-tag">${t}</span>`).join('')}
      </div>
      <h1>${meta.title}</h1>
      <div class="post-meta">
        <span>${formatDate(meta.date)}</span>
        <span>·</span>
        <span>${meta.readTime}</span>
        <span>·</span>
        <span>by Harsh Yadav</span>
      </div>
    `;
  }

  // Fetch and render markdown
  try {
    const md = await fetchPost(slug);
    const body = document.getElementById('postBody');

    // Configure marked with highlight.js
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true,
    });

    body.innerHTML = marked.parse(md);
    hljs.highlightAll();
    addCopyButtons();
    buildTOC();
  } catch (e) {
    document.getElementById('postBody').innerHTML = `
      <p style="color:var(--text-2); text-align:center; padding: 60px 0;">
        Post not found. <a href="blog.html" style="color:var(--accent);">Back to blog →</a>
      </p>
    `;
  }

  // Reading progress
  window.addEventListener('scroll', () => {
    const body = document.body;
    const html = document.documentElement;
    const height = Math.max(body.scrollHeight, html.scrollHeight) - window.innerHeight;
    const progress = window.scrollY / height;
    document.getElementById('readingProgress').style.transform = `scaleX(${progress})`;
  });
});

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}
</script>
<script src="js/admin-trigger.js"></script>
