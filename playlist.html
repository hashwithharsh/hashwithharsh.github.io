<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Apply admin-synced social links / settings
  applyGlobalSettings();

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    window.location.href = 'blog.html';
    return;
  }

  const playlists = await fetchPlaylists();
  const playlist = playlists.find(p => p.slug === slug);

  if (!playlist) {
    document.getElementById('playlistTitle').textContent = 'Playlist not found';
    document.getElementById('playlistPosts').innerHTML = `
      <div class="loading-state">
        <span style="color:var(--text-3)">Playlist not found. <a href="blog.html" style="color:var(--accent);">Back to blog →</a></span>
      </div>`;
    return;
  }

  // Update header
  document.title = playlist.title + ' — hashwithharsh';
  document.getElementById('playlistTitle').textContent = playlist.title;
  document.getElementById('playlistDescription').textContent = playlist.description;
  document.getElementById('playlistPostCount').textContent = (playlist.posts?.length || 0) + ' posts';
  document.getElementById('playlistDate').textContent = 'Created ' + new Date(playlist.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Load all blogs
  const blogs = await fetchBlogs();

  // Filter blogs that are in this playlist
  const playlistPosts = blogs.filter(blog => playlist.posts.includes(blog.slug));

  if (!playlistPosts.length) {
    document.getElementById('playlistPosts').innerHTML = `
      <div class="loading-state">
        <span style="color:var(--text-3)">No posts in this playlist yet.</span>
      </div>`;
    return;
  }

  // Render posts
  renderBlogItems(playlistPosts, 'playlistPosts', [playlist]);
});
</script>
