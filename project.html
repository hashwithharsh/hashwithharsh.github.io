<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Project details by Harsh Yadav." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>#</text></svg>" />
</head>
<body>

<nav id="nav">
  <div class="container">
    <a href="index.html" class="nav-logo"><span>#</span>hashwithharsh</a>
    <ul class="nav-links">
      <li><a href="index.html#about">about</a></li>
      <li><a href="projects.html" style="color:var(--text)">projects</a></li>
      <li><a href="blog.html">blog</a></li>
    </ul>
    <a href="index.html#contact" class="nav-cta">say hello →</a>
    <div class="nav-hamburger" id="menuBtn">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <span class="mobile-close" id="closeMenu">✕ close</span>
  <a href="index.html">home</a>
  <a href="projects.html">projects</a>
  <a href="blog.html">blog</a>
  <a href="index.html#contact">contact</a>
</div>

<!-- Reading progress bar -->
<div id="readingProgress" style="
  position:fixed;
  top:var(--nav-h);
  left:0; right:0;
  height:2px;
  background:var(--accent);
  transform-origin:left;
  transform:scaleX(0);
  z-index:999;
  transition:transform .1s linear;
"></div>

<!-- Project Header (filled by JS) -->
<div class="project-detail-header" id="projectDetailHeader">
  <div class="container">
    <div class="loading-state" style="padding:40px 0;">
      <div class="loading-spinner"></div>
      <span>loading project...</span>
    </div>
  </div>
</div>

<!-- Project Body (rendered markdown) -->
<div class="project-detail-body post-body" id="projectDetailBody">
  <div class="loading-state">
    <div class="loading-spinner"></div>
  </div>
</div>

<!-- Footer Nav -->
<div style="border-top:1px solid var(--border); padding:48px 0; background:var(--surface);">
  <div class="container" style="max-width:900px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
    <a href="projects.html" class="btn" style="font-size:.78rem;">← all projects</a>
    <a href="index.html#contact" class="btn btn-accent" style="font-size:.78rem;">discuss this →</a>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <span class="footer-logo"><span>#</span>hashwithharsh</span>
      <ul class="footer-links">
        <li><a href="https://github.com/harshyadav" target="_blank" rel="noopener">github</a></li>
        <li><a href="https://linkedin.com/in/harshyadav" target="_blank" rel="noopener">linkedin</a></li>
        <li><a href="mailto:harsh@hashwithharsh.dev">email</a></li>
      </ul>
      <span class="footer-copy">© 2025 Harsh Yadav</span>
    </div>
  </div>
</footer>

<!-- Marked.js for Markdown parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="js/content.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Apply admin-synced social links / settings
  applyGlobalSettings();

  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id');

  if (!id) {
    window.location.href = 'projects.html';
    return;
  }

  // ── Load metadata ──────────────────────────
  const projects = await fetchProjects();
  const project  = projects.find(p => p.id === id);

  const header = document.getElementById('projectDetailHeader');

  if (project) {
    document.title = project.title + ' — hashwithharsh';

    // Open Graph tags
    const setMeta = (prop, content, attr = 'property') => {
      let el = document.querySelector(`meta[${attr}="${prop}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
      el.setAttribute('content', content);
    };
    setMeta('og:title',       project.title);
    setMeta('og:description', project.description);
    setMeta('og:type',        'article');
    setMeta('twitter:card',   'summary', 'name');

    const githubIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.579.688.481C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>`;

    const statusLabel = project.status === 'active' ? 'active' :
                        project.status === 'wip'    ? 'in progress' : 'archived';

    header.innerHTML = `
      <div class="container" style="max-width:900px;">
        <a href="projects.html" style="
          font-family:var(--ff-mono);
          font-size:.72rem;
          color:var(--text-3);
          letter-spacing:.06em;
          display:inline-flex;
          align-items:center;
          gap:6px;
          margin-bottom:32px;
          transition:color .2s;
        " onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'">
          ← back to projects
        </a>

        <div class="project-detail-meta">
          ${project.tags.map(t => `<span class="blog-tag">${t}</span>`).join('')}
          ${project.date
            ? `<span class="project-detail-year">${new Date(project.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>`
            : project.year
              ? `<span class="project-detail-year">${project.year}</span>`
              : ''}
        </div>

        <h1>${project.title}</h1>
        <p class="project-detail-desc">${project.description}</p>

        <div class="project-detail-links">
          ${project.github
            ? `<a href="${project.github}" target="_blank" rel="noopener" class="btn">
                ${githubIcon} &nbsp;github repo
               </a>`
            : ''}
          ${project.demo
            ? `<a href="${project.demo}" target="_blank" rel="noopener" class="btn btn-accent">
                live demo →
               </a>`
            : ''}
        </div>

        <div class="project-detail-badges">
          <div class="project-status ${project.status}">${statusLabel}</div>
          ${project.featured ? '<span class="featured-badge">featured project</span>' : ''}
        </div>
      </div>
    `;
  } else {
    header.innerHTML = `
      <div class="container" style="max-width:900px;">
        <a href="projects.html" style="font-family:var(--ff-mono); font-size:.72rem; color:var(--text-3); display:inline-block; margin-bottom:32px;">← back to projects</a>
        <h1>Project not found</h1>
      </div>
    `;
  }

  // ── Load and render markdown ───────────────
  try {
    const md   = await fetchProjectPost(id);
    const body = document.getElementById('projectDetailBody');

    // Configure marked with highlight.js
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true,
    });

    body.innerHTML = marked.parse(md);
    hljs.highlightAll();
    addCopyButtons();
    buildTOC();

  } catch (err) {
    document.getElementById('projectDetailBody').innerHTML = `
      <p style="color:var(--text-2); text-align:center; padding:60px 0; font-family:var(--ff-mono); font-size:.85rem;">
        Detailed write-up coming soon.<br><br>
        <a href="projects.html" style="color:var(--accent);">← back to projects</a>
      </p>
    `;
  }

  // ── Reading progress ───────────────────────
  window.addEventListener('scroll', () => {
    const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) - window.innerHeight;
    document.getElementById('readingProgress').style.transform = `scaleX(${window.scrollY / h})`;
  }, { passive: true });
});
</script>
<script src="js/admin-trigger.js"></script>
</body>
</html>
